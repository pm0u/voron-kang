[heater_bed]
heater_pin: PA1
# Outer sensor: build plate surface — this is what the outer PID loop controls to
sensor_type: Generic 3950
sensor_pin: PB0
max_power: 1.0
min_temp: 0
max_temp: 125
# Inner sensor: heater pad — fast inner loop, protects the pad from overheating
inner_sensor_name: bed_heater_pad
inner_max_temp: 140

# Bed Fans
[heater_generic chamber]
heater_pin: PA0
sensor_pin: PC5
sensor_type: Generic 3950
max_power: 1.0
min_temp: 0
max_temp: 90
control: pid
pid_Kp: 76.812
pid_Ki: 0.441
pid_Kd: 3341.332
smooth_time: 2.0

[verify_heater chamber]
check_gain_time: 360
