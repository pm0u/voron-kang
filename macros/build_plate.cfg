# Build plate → beacon model mapping
#
# Orca Slicer passes the plate type via {curr_bed_type} in the machine start G-code,
# which produces human-readable names like "Textured PEI Plate".
# Values come from src/libslic3r/PrintConfig.cpp (curr_bed_type enum_values).
#
# Add PLATE_TYPE={curr_bed_type} to your Orca machine start G-code, then this
# macro will select the correct beacon model for that surface. If the model for
# the requested plate hasn't been calibrated yet, it falls back to textured_pei
# with a warning.
#
# Beacon model names used here (calibrate and SAVE_CONFIG for each):
#   textured_pei        – textured PEI plate  (fallback default)
#   smooth_pei          – smooth / high-temp PEI plate
#   cool_plate          – smooth cool plate (PC)
#   textured_cool_plate – textured cool plate (PC)
#   engineering         – engineering plate
#   supertack           – SuperTack cool plate

[gcode_macro BEACON_LOAD_MODEL]
description: Select beacon model for the given Orca build plate name
gcode:
  {%- import message as msg -%}
  {% set plate = params.PLATE_TYPE|default('')|lower|trim %}

  # ── plate name → beacon model name ────────────────────────────────────────
  # Keys are lowercased Orca {curr_bed_type} strings (from PrintConfig.cpp).
  # Values are [beacon model <name>] section names saved in printer.cfg.
  {% set plate_map = {
    'textured pei plate'  : 'textured_pei',
    'high temp plate'     : 'smooth_pei',
    'cool plate'          : 'cool_plate',
    'textured cool plate' : 'textured_cool_plate',
    'engineering plate'   : 'engineering',
    'supertack plate'     : 'supertack'
  } %}

  {% set fallback = 'textured_pei' %}

  # ── resolve target model name ──────────────────────────────────────────────
  {% if plate in plate_map %}
    {% set target = plate_map[plate] %}
  {% else %}
    {% if plate != '' %}
      {msg.warning("BEACON_LOAD_MODEL: unknown plate type '" + plate + "', using fallback.")}
    {% endif %}
    {% set target = fallback %}
  {% endif %}

  # ── load model or fall back ────────────────────────────────────────────────
  {% set target_section = 'beacon model ' + target %}
  {% set fallback_section = 'beacon model ' + fallback %}
  {% if target_section in printer.configfile.config %}
    BEACON_MODEL_SELECT NAME={target}
    {msg.info("Beacon model: " + target)}
  {% elif target != fallback and fallback_section in printer.configfile.config %}
    {msg.warning("Beacon model '" + target + "' not found for plate '" + plate + "'. Falling back to '" + fallback + "'.")}
    BEACON_MODEL_SELECT NAME={fallback}
  {% else %}
    {msg.warning("Beacon model '" + target + "' not found and fallback '" + fallback + "' also missing. Using beacon default.")}
  {% endif %}
